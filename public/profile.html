<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人设置 - 蓝莓计件工资系统</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <!-- 个人设置页面专用样式（可选） -->
    <link rel="stylesheet" href="css/pages/profile.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">🫐 蓝莓系统</div>
            <nav class="nav-menu"></nav>
            <div class="user-info">
                <div class="user-name" id="userName"></div>
                <div class="user-role" id="userRoleDisplay"></div>
                <button class="btn-logout" id="logoutBtn">登出</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>个人设置</h1>
            </header>

            <div class="card">
                <div class="card-header">
                    <h2>个人信息</h2>
                </div>

                <form id="profileForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>姓名</label>
                            <input type="text" id="realName" required>
                        </div>
                        <div class="form-group">
                            <label>邮箱</label>
                            <input type="email" id="email" disabled>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>手机号</label>
                            <input type="tel" id="phone" required>
                        </div>
                        <div class="form-group">
                            <label>身份证号</label>
                            <input type="text" id="idCard">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>银行卡户名</label>
                            <input type="text" id="bankName">
                        </div>
                        <div class="form-group">
                            <label>银行卡号</label>
                            <input type="text" id="bankCard">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>开户银行</label>
                        <input type="text" id="bankBank">
                    </div>

                    <button type="submit" class="btn-primary">保存信息</button>
                </form>
            </div>

            <div class="card" style="margin-top: 20px;">
                <div class="card-header">
                    <h2>修改密码</h2>
                </div>

                <form id="passwordForm">
                    <div class="form-group">
                        <label>原密码</label>
                        <input type="password" id="oldPassword" required>
                    </div>
                    <div class="form-group">
                        <label>新密码</label>
                        <input type="password" id="newPassword" required>
                    </div>
                    <div class="form-group">
                        <label>确认新密码</label>
                        <input type="password" id="confirmPassword" required>
                    </div>
                    <button type="submit" class="btn-primary">修改密码</button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/router.js"></script>
    <script src="js/pages/profile.js"></script>
</body>
</html>
